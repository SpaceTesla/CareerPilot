name: careerpilot-backend

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: careerpilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careerpilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: careerpilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: careerpilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: careerpilot-backend:latest
    container_name: careerpilot-api
    env_file:
      - .env.local
    environment:
      MODEL_NAME: ${MODEL_NAME:-gemini-2.5-flash}
      TEMPERATURE: ${TEMPERATURE:-0.0}
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/careerpilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      PGVECTOR_ENABLED: "true"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    working_dir: /app
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--app-dir",
        "src",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: careerpilot-backend:latest
    container_name: careerpilot-db-init
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/careerpilot
      PGVECTOR_ENABLED: "true"
    command:
      ["python", "-m", "app.infrastructure.database.init_db"]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
